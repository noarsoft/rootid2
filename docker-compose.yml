# docker compose up -d
# npm run dev

# เข้าถึง pgAdmin ได้ที่ http://localhost:5050 Email: admin@example.com Password: admin
# Add Server ใน pgAdmin
# Name: rootidx-postgres
# Host name/address: postgres
# Port: 5433
# Maintenance database: rootid_figma
# Username: appuser
# Password: x

services:
  postgres:
    image: postgres:16-alpine
    container_name: rootidx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rootid_figma
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: x
      TZ: Asia/Bangkok
    ports:
      - "5433:5432"
    volumes:
      - rootidx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d rootid_figma"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rootidx-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      TZ: Asia/Bangkok
    ports:
      - "5050:80"
    volumes:
      - rootidx_pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  rootidx_pgdata:
  rootidx_pgadmin: